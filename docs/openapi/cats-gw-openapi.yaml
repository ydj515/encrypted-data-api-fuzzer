openapi: 3.0.3
info:
  title: CATS Gateway API Contract
  version: 1.0.0
  description: |
    CATS -> Gateway -> Mock REST API Server 체인 테스트용 OpenAPI 입니다.
    Gateway의 단일 진입점(POST /cats/{org}/{service}/{api})에 맞춘 계약입니다.
    Gateway는 비정상 요청을 400, 지원하지 않는 메서드를 405, 업스트림 연결 실패를 503으로 반환합니다.
servers:
  - url: http://localhost:28080
    description: Gateway local server

tags:
  - name: Gateway
    description: Gateway 단일 프록시 진입점

paths:
  /cats/{org}/{service}/{api}:
    post:
      tags: [Gateway]
      summary: Gateway 단일 진입점 호출
      operationId: gatewayProxyPost
      description: |
        api path 변수에 따라 업스트림 externalPath가 결정됩니다.
        현재 지원 시나리오 api 값:
        - listResources
        - getResourceDetail
        - getResourceInventory
        - getResourceSchedules
        - listDailySchedules
        - createReservation
        - cancelReservation
        - getReservationDetail
      parameters:
        - $ref: "#/components/parameters/Org"
        - $ref: "#/components/parameters/Service"
        - $ref: "#/components/parameters/Api"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GatewayPlainRequest"
            examples:
              listResources:
                summary: 자원 목록 조회
                value:
                  page: 0
                  size: 20
                  category: SPACE
              getResourceDetail:
                summary: 자원 상세조회
                value:
                  resourceId: R-001
              getResourceInventory:
                summary: 자원 재고 확인
                value:
                  resourceId: R-001
                  date: 2026-02-26
              getResourceSchedules:
                summary: 자원 스케줄 조회
                value:
                  resourceId: R-001
                  from: 2026-02-26T09:00:00+09:00
                  to: 2026-02-26T21:00:00+09:00
              listDailySchedules:
                summary: 일별 스케줄 목록 조회
                value:
                  date: 2026-02-26
              createReservation:
                summary: 예약 생성
                value:
                  resourceId: R-001
                  scheduleId: R-001-2026-02-26-9
                  userId: user-001
                  quantity: 1
                  memo: cats test
              cancelReservation:
                summary: 예약 취소
                value:
                  reservationId: RSV-1700000000000
                  reason: user requested
              getReservationDetail:
                summary: 예약 상세정보 조회
                value:
                  reservationId: RSV-1700000000000
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayResponse"
        "201":
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  parameters:
    Org:
      name: org
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 50
        pattern: '^[A-Za-z0-9._-]{1,50}$'
      example: catsOrg
    Service:
      name: service
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 50
        pattern: '^[A-Za-z0-9._-]{1,50}$'
      example: booking
    Api:
      name: api
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9._-]{1,50}$'
        enum:
          - listResources
          - getResourceDetail
          - getResourceInventory
          - getResourceSchedules
          - listDailySchedules
          - createReservation
          - cancelReservation
          - getReservationDetail

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 라우트 또는 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    MethodNotAllowed:
      description: 지원하지 않는 HTTP 메서드
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: 예약 충돌/재고 부족
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: 업스트림 서비스 연결 실패
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: 내부 서버 오류
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    GatewayPlainRequest:
      type: object
      additionalProperties: true
      description: |
        Gateway는 본문을 문자열 그대로 암호화/전달합니다.
        템플릿 치환 값(resourceId, reservationId 등)은 최상위 또는 pathVariables 하위로 전달할 수 있습니다.
      properties:
        resourceId:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,100}$'
        reservationId:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,100}$'
        date:
          type: string
          format: date
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        page:
          type: integer
          minimum: 0
          maximum: 10000
          default: 0
        size:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        category:
          type: string
        scheduleId:
          type: string
        userId:
          type: string
        quantity:
          type: integer
          minimum: 1
          maximum: 9999
        memo:
          type: string
          maxLength: 500
        reason:
          type: string
          minLength: 1
          maxLength: 200
        pathVariables:
          type: object
          additionalProperties:
            type: string

    GatewayResponse:
      description: Gateway가 업스트림 응답을 복호화해 반환한 평문 JSON
      oneOf:
        - $ref: "#/components/schemas/ResourceListResponse"
        - $ref: "#/components/schemas/ResourceDetail"
        - $ref: "#/components/schemas/InventoryStatus"
        - $ref: "#/components/schemas/ScheduleListResponse"
        - $ref: "#/components/schemas/DailyScheduleListResponse"
        - $ref: "#/components/schemas/ReservationCreateResponse"
        - $ref: "#/components/schemas/ReservationCancelResponse"
        - $ref: "#/components/schemas/ReservationDetailResponse"

    ResourceListResponse:
      type: object
      required: [items, page, size, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ResourceSummary"
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0

    ResourceSummary:
      type: object
      required: [resourceId, name, category, active]
      properties:
        resourceId:
          type: string
        name:
          type: string
        category:
          type: string
        active:
          type: boolean

    ResourceDetail:
      allOf:
        - $ref: "#/components/schemas/ResourceSummary"
        - type: object
          required: [description, location, timezone]
          properties:
            description:
              type: string
            location:
              type: string
            timezone:
              type: string

    InventoryStatus:
      type: object
      required:
        [resourceId, date, totalQuantity, availableQuantity, reservedQuantity]
      properties:
        resourceId:
          type: string
        date:
          type: string
          format: date
        totalQuantity:
          type: integer
        availableQuantity:
          type: integer
        reservedQuantity:
          type: integer

    ScheduleListResponse:
      type: object
      required: [resourceId, items]
      properties:
        resourceId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleItem"

    ScheduleItem:
      type: object
      required: [scheduleId, startAt, endAt, status]
      properties:
        scheduleId:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [AVAILABLE, RESERVED, BLOCKED]

    DailyScheduleListResponse:
      type: object
      required: [date, items]
      properties:
        date:
          type: string
          format: date
        items:
          type: array
          items:
            $ref: "#/components/schemas/DailyScheduleItem"

    DailyScheduleItem:
      type: object
      required: [resourceId, scheduleId, startAt, endAt, status]
      properties:
        resourceId:
          type: string
        scheduleId:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [AVAILABLE, RESERVED, BLOCKED]

    ReservationCreateResponse:
      type: object
      required: [reservationId, status, createdAt]
      properties:
        reservationId:
          type: string
        status:
          type: string
          enum: [CREATED, CONFIRMED, WAITLISTED]
        createdAt:
          type: string
          format: date-time

    ReservationCancelResponse:
      type: object
      required: [reservationId, status, canceledAt]
      properties:
        reservationId:
          type: string
        status:
          type: string
          enum: [CANCELED]
        canceledAt:
          type: string
          format: date-time

    ReservationDetailResponse:
      type: object
      required:
        [
          reservationId,
          resourceId,
          scheduleId,
          userId,
          quantity,
          status,
          createdAt,
        ]
      properties:
        reservationId:
          type: string
        resourceId:
          type: string
        scheduleId:
          type: string
        userId:
          type: string
        quantity:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [CREATED, CONFIRMED, WAITLISTED, CANCELED]
        createdAt:
          type: string
          format: date-time
        canceledAt:
          type: string
          format: date-time
          nullable: true

    ErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          type: string
          example: INVALID_REQUEST
        message:
          type: string
          example: Request body is not valid JSON
        traceId:
          type: string
