<!DOCTYPE html>

</head>
<body>

<header th:replace="~{fragments/layout :: detailHeader(${run})}"></header>

<main class="container py-4">
  <th:block th:replace="~{fragments/run-detail :: metaCard}"></th:block>
  <th:block th:replace="~{fragments/run-detail :: filterPanel}"></th:block>
  <th:block th:replace="~{fragments/run-detail :: casesSection}"></th:block>
</main>

<th:block th:replace="~{fragments/run-detail :: failurePopover}"></th:block>
