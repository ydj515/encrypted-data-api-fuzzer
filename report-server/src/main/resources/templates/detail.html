<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${run.id + ' — API Test Report'}">배치 상세</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #1a1d23;
      min-height: 100vh;
    }

    header {
      background: #1a1d23;
      color: #fff;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header a { color: #9ca3af; text-decoration: none; font-size: 0.875rem; transition: color 0.15s; }
    header a:hover { color: #fff; }
    header .sep { color: #4b5563; font-size: 0.875rem; }
    header .current { font-size: 0.875rem; font-weight: 600; color: #fff; }

    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* 메타 요약 카드 */
    .meta-card {
      background: #fff;
      border-radius: 10px;
      padding: 24px 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      margin-bottom: 28px;
    }
    .meta-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .run-id {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1d23;
      font-family: 'SFMono-Regular', Consolas, monospace;
      word-break: break-all;
    }
    .report-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: #f3f4f6;
      color: #374151;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid #e5e7eb;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .report-link:hover { background: #e5e7eb; }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    .meta-item { display: flex; flex-direction: column; gap: 4px; }
    .meta-label { font-size: 0.72rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; }
    .meta-value { font-size: 0.9rem; color: #1a1d23; font-weight: 500; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-pass { background: #dcfce7; color: #16a34a; }
    .badge-fail { background: #fee2e2; color: #dc2626; }
    .badge-karate { background: #eff6ff; color: #3b82f6; border: 1px solid #bfdbfe; }
    .badge-cats { background: #fdf4ff; color: #9333ea; border: 1px solid #e9d5ff; }
    .badge-scenario { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; font-size: 0.72rem; }
    .badge-http { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; font-size: 0.72rem; }

    .api-label {
      display: inline-block;
      padding: 2px 8px;
      background: #eff6ff;
      color: #3b82f6;
      border: 1px solid #bfdbfe;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    .api-all { color: #9ca3af; font-size: 0.85rem; font-style: italic; }

    .stat-group { display: flex; gap: 20px; }
    .stat-item { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 0.72rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-number { font-size: 1.4rem; font-weight: 700; }
    .stat-total { color: #374151; }
    .stat-pass { color: #16a34a; }
    .stat-fail { color: #dc2626; }

    /* 케이스 테이블 */
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1d23;
      margin-bottom: 12px;
    }
    .case-count { font-size: 0.85rem; color: #6b7280; margin-bottom: 12px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    thead tr { background: #f0f2f5; }
    th, td { padding: 12px 16px; text-align: left; font-size: 0.875rem; }
    th { font-weight: 600; color: #374151; white-space: nowrap; }
    tbody tr { border-top: 1px solid #e5e7eb; }
    tbody tr:hover { background: #f9fafb; }
    tbody tr.row-fail { border-left: 3px solid #fca5a5; }
    tbody tr.row-pass { border-left: 3px solid transparent; }

    .case-name { font-weight: 500; color: #1a1d23; }
    .scenario-name { font-size: 0.78rem; color: #6b7280; margin-top: 2px; }
    .endpoint {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.8rem;
      color: #374151;
      word-break: break-all;
      max-width: 280px;
    }
    .method {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      font-family: monospace;
    }
    .method-get { background: #dcfce7; color: #15803d; }
    .method-post { background: #dbeafe; color: #1d4ed8; }
    .method-put { background: #fef3c7; color: #92400e; }
    .method-patch { background: #fdf4ff; color: #7e22ce; }
    .method-delete { background: #fee2e2; color: #991b1b; }
    .method-other { background: #f3f4f6; color: #374151; }

    .http-code {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 600;
      font-family: monospace;
    }
    .http-2xx { background: #dcfce7; color: #15803d; }
    .http-3xx { background: #dbeafe; color: #1d4ed8; }
    .http-4xx { background: #fef3c7; color: #92400e; }
    .http-5xx { background: #fee2e2; color: #991b1b; }
    .http-other { background: #f3f4f6; color: #374151; }

    .duration { font-size: 0.82rem; color: #6b7280; white-space: nowrap; }

    .failure-msg {
      font-size: 0.78rem;
      color: #dc2626;
      font-family: monospace;
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: #6b7280;
      font-size: 0.95rem;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
  </style>
</head>
<body>

<header>
  <a th:href="@{/}">API Test Report</a>
  <span class="sep">/</span>
  <a th:href="@{/services/{org}/{service}(org=${run.org},service=${run.service})}"
     th:text="${run.org + ' / ' + run.service}"></a>
  <span class="sep">/</span>
  <span class="current" th:text="${run.id}"></span>
</header>

<div class="container">

  <!-- 배치 메타 요약 카드 -->
  <div class="meta-card">
    <div class="meta-card-header">
      <div class="run-id" th:text="${run.id}"></div>
      <a th:if="${run.reportPath != null and !#strings.isEmpty(run.reportPath)}"
         th:href="${run.reportPath}"
         target="_blank"
         class="report-link">원본 리포트 열기</a>
    </div>

    <div class="meta-grid">
      <div class="meta-item">
        <span class="meta-label">서비스</span>
        <span class="meta-value" th:text="${run.org + ' / ' + run.service}"></span>
      </div>
      <div class="meta-item">
        <span class="meta-label">소스</span>
        <span th:if="${run.source != null and run.source.name() == 'KARATE'}" class="badge badge-karate">KARATE</span>
        <span th:if="${run.source != null and run.source.name() == 'CATS'}" class="badge badge-cats">CATS</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">대상 API</span>
        <span th:if="${run.api != null and !#strings.isEmpty(run.api)}"
              class="api-label" th:text="${run.api}"></span>
        <span th:unless="${run.api != null and !#strings.isEmpty(run.api)}"
              class="api-all">전체</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">수행 시각</span>
        <span class="meta-value"
              th:if="${run.startedAt != null}"
              th:text="${#temporals.format(run.startedAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
        <span class="meta-value" th:unless="${run.startedAt != null}" style="color:#d1d5db;">-</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">소요 시간</span>
        <span class="meta-value"
              th:text="${#numbers.formatDecimal(run.durationMs / 1000.0, 1, 1) + 's'}"></span>
      </div>
      <div class="meta-item">
        <span class="meta-label">결과</span>
        <span th:if="${run.failCount == 0}" class="badge badge-pass">PASS</span>
        <span th:unless="${run.failCount == 0}" class="badge badge-fail">FAIL</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">케이스 집계</span>
        <div class="stat-group">
          <div class="stat-item">
            <span class="stat-label">전체</span>
            <span class="stat-number stat-total" th:text="${run.totalCount}"></span>
          </div>
          <div class="stat-item">
            <span class="stat-label">통과</span>
            <span class="stat-number stat-pass" th:text="${run.passCount}"></span>
          </div>
          <div class="stat-item">
            <span class="stat-label">실패</span>
            <span class="stat-number stat-fail" th:text="${run.failCount}"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 테스트 케이스 테이블 -->
  <div class="section-title">테스트 케이스</div>
  <div class="case-count" th:text="${cases.size() + '개 케이스'}"></div>

  <div th:if="${#lists.isEmpty(cases)}" class="empty-state">
    테스트 케이스 정보가 없습니다.
  </div>

  <table th:unless="${#lists.isEmpty(cases)}">
    <thead>
      <tr>
        <th>유형</th>
        <th>API</th>
        <th>케이스 명</th>
        <th>엔드포인트</th>
        <th>메서드</th>
        <th>HTTP</th>
        <th>상태</th>
        <th>소요 시간</th>
        <th>실패 메시지</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="c : ${cases}"
          th:classappend="${c.status != null and c.status.name() == 'FAIL'} ? 'row-fail' : 'row-pass'">
        <td>
          <span th:if="${c.caseType != null and c.caseType.name() == 'SCENARIO'}" class="badge badge-scenario">SCENARIO</span>
          <span th:if="${c.caseType != null and c.caseType.name() == 'HTTP_CALL'}" class="badge badge-http">HTTP</span>
          <span th:unless="${c.caseType != null}" style="color:#d1d5db; font-size:0.78rem;">-</span>
        </td>
        <td>
          <span th:if="${c.api != null and !#strings.isEmpty(c.api)}"
                class="api-label" th:text="${c.api}"></span>
          <span th:unless="${c.api != null and !#strings.isEmpty(c.api)}"
                style="color:#d1d5db; font-size:0.78rem;">-</span>
        </td>
        <td>
          <div class="case-name" th:text="${c.name != null ? c.name : '-'}"></div>
          <div th:if="${c.scenarioName != null and !#strings.isEmpty(c.scenarioName) and c.scenarioName != c.name}"
               class="scenario-name" th:text="${c.scenarioName}"></div>
        </td>
        <td>
          <span class="endpoint" th:text="${c.endpoint != null ? c.endpoint : '-'}"
                th:title="${c.endpoint}"></span>
        </td>
        <td>
          <span th:if="${c.httpMethod != null}"
                th:classappend="${
                  c.httpMethod == 'GET'    ? 'method-get'    :
                  c.httpMethod == 'POST'   ? 'method-post'   :
                  c.httpMethod == 'PUT'    ? 'method-put'    :
                  c.httpMethod == 'PATCH'  ? 'method-patch'  :
                  c.httpMethod == 'DELETE' ? 'method-delete' : 'method-other'
                }"
                class="method"
                th:text="${c.httpMethod}"></span>
          <span th:unless="${c.httpMethod != null}" style="color:#d1d5db; font-size:0.78rem;">-</span>
        </td>
        <td>
          <span th:if="${c.httpStatus > 0}"
                th:classappend="${
                  c.httpStatus >= 200 and c.httpStatus < 300 ? 'http-2xx' :
                  c.httpStatus >= 300 and c.httpStatus < 400 ? 'http-3xx' :
                  c.httpStatus >= 400 and c.httpStatus < 500 ? 'http-4xx' :
                  c.httpStatus >= 500                        ? 'http-5xx' : 'http-other'
                }"
                class="http-code"
                th:text="${c.httpStatus}"></span>
          <span th:unless="${c.httpStatus > 0}" style="color:#d1d5db; font-size:0.78rem;">-</span>
        </td>
        <td>
          <span th:if="${c.status != null and c.status.name() == 'PASS'}" class="badge badge-pass">PASS</span>
          <span th:if="${c.status != null and c.status.name() == 'FAIL'}" class="badge badge-fail">FAIL</span>
          <span th:unless="${c.status != null}" style="color:#d1d5db; font-size:0.78rem;">-</span>
        </td>
        <td>
          <span class="duration"
                th:if="${c.durationMs > 0}"
                th:text="${#numbers.formatDecimal(c.durationMs / 1000.0, 1, 1) + 's'}"></span>
          <span th:unless="${c.durationMs > 0}" style="color:#d1d5db; font-size:0.78rem;">-</span>
        </td>
        <td>
          <span th:if="${c.failureMsg != null and !#strings.isEmpty(c.failureMsg)}"
                class="failure-msg"
                th:text="${c.failureMsg}"
                th:title="${c.failureMsg}"></span>
          <span th:unless="${c.failureMsg != null and !#strings.isEmpty(c.failureMsg)}"
                style="color:#d1d5db; font-size:0.78rem;">-</span>
        </td>
      </tr>
    </tbody>
  </table>

</div>

</body>
</html>
