<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/layout :: headContent('API Test Report')}"></th:block>
  <style>
    .empty-state {
      background: transparent;
      box-shadow: none;
      padding: 80px 0;
    }

    .service-name {
      font-weight: 600;
      color: #1a1d23;
    }

    .org-label {
      display: inline-block;
      font-size: 0.75rem;
      color: #6b7280;
      margin-right: 6px;
    }

  </style>
</head>
<body>

<header th:replace="~{fragments/layout :: homeHeader}"></header>

<main class="container py-4">
  <div class="page-title">서비스 목록</div>

  <div th:if="${#lists.isEmpty(services)}" class="empty-state">
    등록된 테스트 실행 이력이 없습니다.
  </div>

  <table th:unless="${#lists.isEmpty(services)}" class="table table-hover align-middle mb-0">
    <thead>
      <tr>
        <th>서비스명</th>
        <th>API 수</th>
        <th>마지막 수행</th>
        <th>상태</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="svc : ${services}">
        <td>
          <span class="org-label" th:text="${svc.org}"></span>
          <span class="service-name" th:text="${svc.service}"></span>
        </td>
        <td>
          <span class="badge rounded-pill text-bg-secondary px-3 py-2" th:text="${svc.apiCount}">0</span>
        </td>
        <td>
          <span class="last-run"
                th:if="${svc.lastRunAt != null}"
                th:text="${#temporals.format(svc.lastRunAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
          <span th:unless="${svc.lastRunAt != null}" class="last-run" style="color:#d1d5db;">-</span>
        </td>
        <td>
          <span th:if="${svc.lastStatus == null}" class="badge rounded-pill text-bg-secondary">-</span>
          <span th:if="${svc.lastStatus != null and svc.lastStatus.name() == 'PASS'}"
                class="badge rounded-pill text-bg-success">PASS</span>
          <span th:if="${svc.lastStatus != null and svc.lastStatus.name() == 'FAIL'}"
                class="badge rounded-pill text-bg-danger">FAIL</span>
        </td>
        <td>
          <a th:href="@{/services/{org}/{service}(org=${svc.org}, service=${svc.service})}"
             class="detail-button">상세 보기</a>
        </td>
      </tr>
    </tbody>
  </table>
</main>

<th:block th:replace="~{fragments/layout :: bootstrapScript}"></th:block>

</body>
</html>
