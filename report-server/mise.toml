[tools]
java = "21.0.2"

[tasks.run]
description = "Start report-server (port 48080)"
run = "./gradlew bootRun"

[tasks.build]
description = "Compile and package"
run = "./gradlew build"

[tasks.test]
description = "Run JUnit 5 test suite"
run = "./gradlew test"

[tasks.clean]
description = "Clean build artifacts"
run = "./gradlew clean"
