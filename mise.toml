[tools]
java = "21.0.2"

# --- Individual service launchers ---

[tasks."gateway:run"]
description = "Start gateway service"
run = "cd gateway && ./gradlew bootRun"

[tasks."mock:run"]
description = "Start mock-rest-api-server (port 18080)"
run = "cd mock-rest-api-server && ./gradlew bootRun"

# --- Aggregate tasks (sequential) ---

[tasks.build]
description = "Build all modules sequentially (gateway → mock)"
run = """
set -e
(cd gateway && ./gradlew build)
(cd mock-rest-api-server && ./gradlew build)
"""

[tasks."karate:run"]
description = "Run Karate scenario tests (ORG/SERVICE/API env vars for scope)"
run = "cd karate-tests && ./gradlew test"

[tasks."karate:publish"]
description = "Karate 리포트를 공유 저장소로 발행 (ORG/SERVICE/API/TEST_CASE_GRANULARITY 환경변수 승계)"
run = "scripts/publish-karate-report.sh"

[tasks."karate"]
description = "Karate 실행 + 리포트 발행"
run = """
set -e
mise run karate:run
mise run karate:publish
"""

[tasks.test]
description = "Test all modules sequentially (gateway → mock)"
run = """
set -e
(cd gateway && ./gradlew test)
(cd mock-rest-api-server && ./gradlew test)
"""

[tasks."cats:run"]
description = "CATS 퍼징 실행 (ORG/SERVICE/API 환경변수로 범위 제한)"
run = "scripts/run-cats-gw.sh"

[tasks."cats:publish"]
description = "CATS 리포트를 report-server 저장소로 발행 (ORG/SERVICE/API 환경변수 승계)"
run = "scripts/publish-cats-report.sh"

[tasks."cats"]
description = "CATS 실행 + 리포트 발행"
run = """
set -e
mise run cats:run
mise run cats:publish
"""

[tasks."report:run"]
description = "Start report-server (port 48080)"
run = "cd report-server && ./gradlew bootRun"

[tasks.clean]
description = "Clean all modules"
run = """
set -e
(cd gateway && ./gradlew clean)
(cd mock-rest-api-server && ./gradlew clean)
"""
