[tools]
java = "21.0.2"

# --- Individual service launchers ---

[tasks."gateway:run"]
description = "Start gateway service"
run = "cd gateway && ./gradlew bootRun"

[tasks."mock:run"]
description = "Start mock-rest-api-server (port 18080)"
run = "cd mock-rest-api-server && ./gradlew bootRun"

# --- Aggregate tasks (sequential) ---

[tasks.build]
description = "Build application modules sequentially"
run = """
set -e
(cd gateway && ./gradlew build)
(cd mock-rest-api-server && ./gradlew build)
(cd report-server && ./gradlew build)
"""

[tasks."karate:run"]
description = "Karate 시나리오 실행 (ORG/SERVICE/API 환경변수로 범위 제한)"
run = "scripts/run-karate.sh"

[tasks."karate:publish"]
description = "Karate 리포트를 공유 저장소로 발행 (ORG/SERVICE/API/TEST_CASE_GRANULARITY 환경변수 승계)"
run = "scripts/publish-karate-report.sh"

[tasks."karate"]
description = "Karate 실행 + 리포트 발행 (기본: 전체 서비스, ORG/SERVICE/API로 범위 제한)"
run = "SOURCE=karate scripts/run-tests-matrix.sh"

[tasks.test]
description = "통합 테스트 매트릭스 실행 (기본: 전체 서비스, SOURCE=karate|cats|all, ORG/SERVICE/API로 범위 제한)"
run = "scripts/run-tests-matrix.sh"

[tasks."test:all-services"]
description = "통합 테스트 매트릭스 실행 명시 태스크 (기본: 전체 서비스)"
run = "scripts/run-tests-matrix.sh"

[tasks."test:single"]
description = "단일 기관/서비스 대상 통합 테스트 실행 (기본: catsOrg/booking)"
run = "scripts/run-tests.sh"

[tasks."unit:test"]
description = "모듈 단위 테스트 실행 (gateway → mock → report-server)"
run = """
set -e
(cd gateway && ./gradlew test)
(cd mock-rest-api-server && ./gradlew test)
(cd report-server && ./gradlew test)
"""

[tasks."cats:run"]
description = "CATS 퍼징 실행 (ORG/SERVICE/API 환경변수로 범위 제한, CATS_PROFILE=full|smoke)"
run = "scripts/run-cats.sh"

[tasks."cats:publish"]
description = "CATS 리포트를 report-server 저장소로 발행 (ORG/SERVICE/API 환경변수 승계)"
run = "scripts/publish-cats-report.sh"

[tasks."cats"]
description = "CATS 실행 + 리포트 발행 (기본: 전체 서비스, ORG/SERVICE/API로 범위 제한)"
run = "SOURCE=cats scripts/run-tests-matrix.sh"

[tasks."report:run"]
description = "Start report-server (port 48080)"
run = "cd report-server && ./gradlew bootRun"

[tasks.clean]
description = "Clean all modules"
run = """
set -e
(cd gateway && ./gradlew clean)
(cd mock-rest-api-server && ./gradlew clean)
(cd report-server && ./gradlew clean)
(cd karate-tests && ./gradlew clean)
"""
